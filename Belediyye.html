<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whatsapp Botu</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 10px;
            padding: 10px;
            background-color: #ffffff;
            color: #333;
        }
        .container {
            max-width: 500px;
            margin: 0px;
            padding: 0px;
            background-color: #ffffff;
            border-radius: 0px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }
        .divider {
            border-top: 2px solid #007bff;
            margin: 10px 0;
        }
        h3, h4 {
            color: #007bff;
        }
        label {
            font-weight: bold;
            color: #333;
        }
        input, button, textarea {
            display: block;
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #007bff;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #0056b3;
        }
        textarea {
            height: 150px;
            background-color: #f9f9f9;
        }
        .iframe-container {
            position: relative;
            width: 100%;
            overflow: hidden;
            height: 90px; 
            margin-top: 0px;
        }
        iframe {
            position: absolute;
            top: -270px;
            left: 0px;
            width: 100%;
            height: 1300px; /* Increased height to accommodate scrolling */
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .clear-btn {
            background: blue; /* X butonunun arka planını mavi yaptık */
            border: none;
            color: white;
            font-size: 20px; /* Küçük font boyutu */
            cursor: pointer;
            padding: 8px; /* Butonun kare şeklinde olmasını sağladık */
            border-radius: 4px; /* Butona yuvarlatılmış kenar ekledik */
            width: 40px; /* Butonu kare yapmak için genişlik */
            height: 40px; /* Butonu kare yapmak için yükseklik */
            text-align: center; /* Yazıyı ortalamak için */
            font-weight: bold;
        }
        .clear-btn:hover {
            background-color: #0056b3; /* Hover durumunda renk değişimi */
        }
        .street-input {
            width: 90%; /* Küçə metin kutusunun uzunluğunu artırdık */
        }

        /* Ad və soyad inputunda her kelimenin baş harfini büyük yapmak için */
        #name-input, #street-input {
            text-transform: capitalize; /* Baş harfleri büyük yapmak için */
        }
    </style>
</head>
<body>
    <div class="container">
        <h3>Whatsapp botu</h3>

        <!-- Mesaj mətni və kutusu -->
        <h4>Mesaj mətni:</h4>
        <textarea id="message-box" readonly>
Binəqədi rayon Binəqədi bələdiyyəsi
Əmlak vergisi
Borc: 
YVÖK:10011
Ad və soyad: 
Küçə:

Ödəniş növləri:
1) Bank proqramı ilə online ödəniş(Ödənişlər-Dövlət-Bələdiyyələr)
2) MilliÖn və ya E-Manat (Dövlət Ödənişləri-Bələdiyyələr-YVÖK-İRƏLİ)
3) Poçt
4) Kommunal.az saytı (Dövlət ödənişləri-Bələdiyyələr)
5) Linkə toxunmaqla https://kommunal.az/YVOK=10011
        </textarea>
    </div>

    <!-- Nömrə kutucuğu -->
    <div class="input-section">
        <label for="phone-input">Nömrə (+994 sabitdir):</label>
        <input type="text" id="phone-input" placeholder="Məsələn: 050xxxxxxx">
    </div>

    <!-- İframe -->
    <div class="iframe-container">
        <iframe id="kommunal-frame" src="https://kommunal.az/YVOK=10011"></iframe>
    </div>

    <!-- YVÖK daxil edin kutucuğu -->
    <div class="input-section">
        <label id="code-label" for="code-input">YVÖK daxil edin:</label>
        <input type="text" id="code-input" placeholder="Məsələn: əlavə ediləcək kod">
    </div>

    <!-- Digər giriş və düymələr -->
    <div class="input-section">
        <button id="refresh-btn">Səhifəni yenilə</button>
    </div>
    <div class="input-section">
        <label for="name-input">Ad və soyad:</label>
        <input type="text" id="name-input" placeholder="Ad və soyad daxil edin">
    </div>
    <div class="input-section">
        <label for="borc-input">Borc:</label>
        <input type="text" id="borc-input" placeholder="Borcu daxil edin">
    </div>
    <div class="input-section">
        <label for="street-input">Küçə:</label>
        <div class="input-wrapper">
            <input type="text" id="street-input" class="street-input" placeholder="Küçə adını daxil edin">
            <button type="button" id="clear-street-btn" class="clear-btn">x</button>
        </div>
    </div>

    <button id="whatsapp-btn">Whatsapp ilə göndər</button>

    <!-- Yeni Buton: Qanunları mesaja əlavə et -->
    <div class="input-section">
        <button id="add-laws-btn">Qanunları mesaja əlavə et</button>
    </div>

    <div class="divider"></div>

    <script>
        // YVÖK sahəsində yazılanları iframe-ə əlavə edin
        document.getElementById("code-input").addEventListener("input", function() {
            const yvokCode = this.value;
            const iframe = document.getElementById("kommunal-frame");

            if (yvokCode.length === 7) { // Yalnız 7 simvol daxil edildikdə yenilə
                iframe.src = `https://kommunal.az/YVOK=10011${yvokCode}`;
            }

            // YVÖK metin kutusundaki yazıları büyük harfe dönüştür
            this.value = this.value.toUpperCase();
        });

        // Nömrə sahəsinə 10 rəqəm yazıldıqda avtomatik WhatsApp-a yönləndir
        document.getElementById("phone-input").addEventListener("input", function() {
            const phone = this.value;
            const message = document.getElementById("message-box").value;

            if (phone.length === 10) { // 10 rəqəm tamamlandı
                const whatsappUrl = `https://wa.me/994${phone}?text=${encodeURIComponent(message)}`;
                window.open(whatsappUrl, "_blank"); // WhatsApp-ı yeni tabda aç
            }
        });

        // Küçə məlumatını yerli yaddaşda saxla
        const streetInput = document.getElementById("street-input");
        streetInput.value = localStorage.getItem("street") || ""; // Əvvəlki məlumatı yüklə

        streetInput.addEventListener("input", function() {
            localStorage.setItem("street", this.value); // Məlumatı yadda saxla
        });

        // Sayfa yenilə düyməsi
        document.getElementById("refresh-btn").addEventListener("click", function() {
            location.reload();
        });

        // Whatsapp mesajını yenilə
        function updateMessage() {
            let yvok = document.getElementById("code-input").value;
            let borc = document.getElementById("borc-input").value ? document.getElementById("borc-input").value + " AZN" : "";
            let name = document.getElementById("name-input").value;
            let street = document.getElementById("street-input").value;

            let message = `Binəqədi rayon Binəqədi bələdiyyəsi\nƏmlak vergisi\n\nBorc: ${borc}\nYVÖK:10011${yvok}\nAd və soyad: ${name}\nKüçə: ${street}\n\nÖdəniş növləri:\n1) Bank proqramı ilə online ödəniş(Ödənişlər-Dövlət-Bələdiyyələr)\n2) MilliÖn və ya E-Manat (Dövlət Ödənişləri-Bələdiyyələr-YVÖK-İRƏLİ)\n3) Poçt\n4) Kommunal.az saytı (Dövlət ödənişləri-Bələdiyyələr)\n5) Linkə toxunmaqla https://kommunal.az/YVOK=10011${yvok}`;

            document.getElementById("message-box").value = message;
        }

        document.querySelectorAll("#code-input, #borc-input, #name-input, #street-input").forEach(input => {
            input.addEventListener("input", updateMessage);
        });

        // Whatsapp mesajını göndər
        document.getElementById("whatsapp-btn").addEventListener("click", function() {
            const phone = document.getElementById("phone-input").value;
            const message = document.getElementById("message-box").value;

            if (phone && message) {
                const whatsappUrl = `https://wa.me/994${phone}?text=${encodeURIComponent(message)}`;
                window.open(whatsappUrl, "_blank");
            } else {
                alert("Telefon nömrəsi və mesaj daxil edin!");
            }
        });

        // "Qanunları mesaja əlavə et" butonunun funksiyası
        document.getElementById("add-laws-btn").addEventListener("click", function() {
            const lawsText = `
‎ 
Azərbaycan Respublikası Vergi məcəlləsinin 196-cı və 200.1-ci maddəsinə əsasən fiziki şəxslərin xüsusi mülkiyyətində olan binalarına (mənzillərinə görə) əmlak vergisinə cəlb olunur.
Azərbaycan Respublikası 2014-cü ilin iyun tarixi 1004-IVQD nömrəli qanuna əsasən (2015-ci ilin yanvar ayının 1-i qüvvəyə minib) Azərbaycan respublikasının 200.1 və 198.1.1-ci maddəsinə əsasən fiziki şəxs mənzillərin sahəsinə görə əmlak vergisi ödənilməlidir.
Vergi məcəlləsinin 59.1ci maddəsinə əsasən cari vergi müəyyən edilmiş müddətdə ödənilmədikdə ödəmə müddətindən sonrakı hər ödəniş günü 0,1 faiz məbləğində faiz tutulur.
Yerli (Bələdiyyə) vergilər və ödənişlər haqqında "Azərbaycan respublikasının Qanununun 13-cü maddəsinə əsasən" vergi ödəyiciləri vergi qanunvericiliyinin pozulmasına görə məsuliyyət daşıyırlar.
Bələdiyyələrin vergi xidməti orqanı haqqında Əsasnamənin 5.3 maddəsinə rəhbər tutaraq əmlak verginizi ödəməyi tələb edirik.Əks təqdirdə Azərbaycan Respublikası qanunvericiliyi ilə müəyyən edilmiş qaydada məcburi tutulması üçün rayon(şəhər) İcra və Propasiya şöbəsinə müraciət olunacaq.`;

            const messageBox = document.getElementById("message-box");
            messageBox.value += lawsText;
        });

        // "X" butonunun Küçə inputunu temizleme funksiyası
        document.getElementById("clear-street-btn").addEventListener("click", function() {
            const streetInput = document.getElementById("street-input");
            streetInput.value = ''; // Küçə inputunu temizle
            localStorage.removeItem("street"); // Yerli yaddaşdan Küçə məlumatını sil
        });
    </script>
</body>
</html>
